    <circle cx="100" cy="100" r="120" fill="none" stroke="#A100FF" stroke-width="1" stroke-opacity="0.2" />
    <circle cx="100" cy="100" r="160" fill="none" stroke="#A100FF" stroke-width="1" stroke-opacity="0.1" />

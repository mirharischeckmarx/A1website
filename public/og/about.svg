  <rect x="0" y="20" width="1200" height="2" fill="url(#purpleLine)" opacity="0.6" />
  <rect x="0" y="608" width="1200" height="2" fill="url(#purpleLine)" opacity="0.6" />

  <g transform="translate(80, 100)">
